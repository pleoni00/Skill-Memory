services:
  mcp_server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: mcp_server
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      DAG_DB_PATH: ${DAG_DB_PATH:-/app/data/data.db}
      VEC_DB_PATH: ${VEC_DB_PATH:-/app/data/data.db}
      EMBED_DIM: ${EMBED_DIM:-384}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.x.ai/v1}
      LLM_MODEL: ${LLM_MODEL:-grok-3-mini}
      LLM_API_KEY: ${LLM_API_KEY}
      EMBED_BASE_URL: ${EMBED_BASE_URL:-http://embedder:8081/v1}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-small}
      EMBED_API_KEY: ${EMBED_API_KEY:-dummy}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8000}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
    depends_on:
      - embedder
    restart: unless-stopped

  a2a_server:
    build:
      context: .
      dockerfile: Dockerfile.a2a
    container_name: a2a_server
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
    environment:
      DAG_DB_PATH: ${DAG_DB_PATH:-/app/data/data.db}
      VEC_DB_PATH: ${VEC_DB_PATH:-/app/data/data.db}
      EMBED_DIM: ${EMBED_DIM:-384}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.x.ai/v1}
      LLM_MODEL: ${LLM_MODEL:-grok-3-mini}
      LLM_API_KEY: ${LLM_API_KEY}
      EMBED_BASE_URL: ${EMBED_BASE_URL:-http://embedder:8081/v1}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-small}
      EMBED_API_KEY: ${EMBED_API_KEY:-dummy}
    depends_on:
      - embedder
    restart: unless-stopped
